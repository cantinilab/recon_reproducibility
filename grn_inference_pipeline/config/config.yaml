max_mins_per_step: 1100

methods:
    pando:
        exclude_exons: 'TRUE'
        ext: 500000
        thr_corr: 0.05
        p_thresh: 0.1
        rsq_thresh: 0.05
        nvar_thresh: 2
        min_genes_per_module: 3

# Datasets
datasets:
    heartatlas:
        organism: 'hg38'
        paired: true
        url:
            tar: 'https://cellgeni.cog.sanger.ac.uk/heartcellatlas/v2/fragments.tar'
            anndata: 'https://cellgeni.cog.sanger.ac.uk/heartcellatlas/v2/Global_raw.h5ad'
            annot: 'https://cellgeni.cog.sanger.ac.uk/heartcellatlas/v2/Adult_Peaks.h5ad'
        samples:
            ['HCAHeartST10773166_HCAHeartST10781063', 'HCAHeartST10773165_HCAHeartST10781062',
            'HCAHeart9508627_HCAHeart9508819', 'HCAHeart9508629_HCAHeart9508821',
            'HCAHeart9845431_HCAHeart9917173', 'HCAHeartST11064575_HCAHeartST11023240',
            'HCAHeartST11064574_HCAHeartST11023239']
        cases:
            all:
                celltypes: 'all'
                n_hvg: 16384
                n_hvr: 65536
                GRNBoost2_nlinks: 500000
                seed: 2024

    spleen_hybrid:
        organism: 'mm10'
        paired: false
        url:
            archr_project: 'https://www.ncbi.nlm.nih.gov/geo/download/?acc=GSE242466&format=file'
            10X_platform: 'https://cf.10xgenomics.com/samples/cell-exp/7.2.0/4plex_mouse_LymphNode_Spleen/4plex_mouse_LymphNode_Spleen_count_sample_filtered_feature_bc_matrix.h5'
        samples: []
        cases:
            all:
                celltypes: 'all'
                n_hvg: 16000
                n_hvr: 250000
                GRNBoost2_nlinks: 50000

stab_datasets: ['pitupair']
nocombs_datasets: ['pitupair', 'pitunpair']
